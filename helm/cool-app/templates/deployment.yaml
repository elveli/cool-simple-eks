apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-cool-app
  labels:
    app: {{ .Release.Name }}-cool-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-cool-app
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-cool-app
    spec:
      containers:
        - name: cool-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
