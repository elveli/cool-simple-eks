apiVersion: apps/v1
kind: Deployment
metadata:
  name: cool-app
  labels:
    app: cool-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cool-app
  template:
    metadata:
      labels:
        app: cool-app
    spec:
      containers:
      - name: cool-app
        # For demonstration, using nginx. 
        # To use the React app built in this repo, build the Dockerfile, push to Docker Hub/ECR, and replace this image.
        image: nginx:alpine 
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
